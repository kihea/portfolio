<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <title>WithDepth — Reader kit</title>
  <link rel="stylesheet" href="styles.css"/>
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
  <div class="di-stripe-top"></div>
  <div id="app" data-screen-label="WithDepth Reader"></div>

  <script type="text/babel" src="Components.jsx"></script>
  <script type="text/babel">
    const ESSAY = {
      subbrand: 'WithDepth',
      number: '14',
      date: '2026 · 04 · 04',
      title: 'Marx and Lenin, and what each actually said.',
      lede: "Two men separated by sixty years and a successful revolution — a patient walk through where they agreed, where they did not, and why the popular story flattens both.",
      words: '6,800',
      minutes: 34,
    };

    function App() {
      const [progress, setProgress] = React.useState(8);
      const [aside, setAside] = React.useState({ open: false, n: null });
      React.useEffect(() => {
        const onScroll = () => {
          const h = document.documentElement;
          const max = h.scrollHeight - h.clientHeight;
          setProgress(Math.min(100, (h.scrollTop / Math.max(1, max)) * 100));
        };
        window.addEventListener('scroll', onScroll, { passive: true });
        return () => window.removeEventListener('scroll', onScroll);
      }, []);
      const showFn = (n) => {
        setAside({ open: true, n });
        setTimeout(() => setAside(a => ({ ...a, open: false })), 4000);
      };
      const fnText = {
        1: 'See Kolakowski, Main Currents of Marxism, vol. 3, ch. 2 — the canonical "books vs. abuse" story.',
        2: 'Capital vol. 1 (1867), preface; What Is to Be Done? (1902), §§ I–III.',
        3: 'The 1844 Manuscripts, the 1848–52 pamphlets, and the mature 1867–94 Capital.',
      };
      return (<>
        <div className="reader-shell">
          <ReaderChrome progress={progress} />
          <EssayHeader essay={ESSAY} />
          <EssayBody onFn={showFn} />
          <Footnotes />
          <EssayFoot />
        </div>
        <div className={`aside-pop ${aside.open ? '' : 'hidden'}`}>
          <b>FOOTNOTE {aside.n}</b>
          {aside.n ? fnText[aside.n] : ''}
        </div>
      </>);
    }
    ReactDOM.createRoot(document.getElementById('app')).render(<App />);
  </script>
</body>
</html>
