<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css">
<style>
  .badge { display:inline-flex;align-items:center;gap:6px;font-family:var(--font-sans);font-weight:600;font-size:11px;letter-spacing:.14em;text-transform:uppercase;padding:5px 10px;border:1px solid #181412;border-radius:2px }
  .pill  { display:inline-flex;align-items:center;gap:6px;font-family:var(--font-sans);font-weight:500;font-size:12px;padding:6px 12px;border:1px solid rgba(24,20,18,.6);border-radius:999px;color:#181412;background:#F4ECDA }
  .tag-num { font-family:var(--font-serif);font-style:italic;font-size:13px;color:#B11226 }
</style>
</head>
<body style="min-height:240px;padding:28px 32px"><div class="card">
  <div class="label-eyebrow" style="margin-bottom:18px">Badges, pills, series tags</div>
  <div style="display:flex;flex-wrap:wrap;gap:10px;align-items:center">
    <span class="badge" style="background:#B11226;color:#F4ECDA;border-color:#B11226">SYSTEMATIC SIN <span class="tag-num" style="color:#F4ECDA">№07</span></span>
    <span class="badge" style="background:#181412;color:#F4ECDA;border-color:#181412">WITHDEPTH</span>
    <span class="badge" style="background:#F4ECDA;color:#181412">PUNCHUP DROP</span>
    <span class="badge" style="background:#D9B98A;color:#181412;border-color:#181412">FACTION OF TRUTH</span>
  </div>
  <div style="display:flex;flex-wrap:wrap;gap:8px;margin-top:16px">
    <span class="pill">capitalism</span>
    <span class="pill">labor</span>
    <span class="pill">housing</span>
    <span class="pill">empire</span>
    <span class="pill">philosophy</span>
    <span class="pill" style="background:#B11226;color:#F4ECDA;border-color:#B11226">+ all topics</span>
  </div>
  <div style="display:flex;gap:14px;margin-top:18px;font-family:var(--font-serif);font-size:14px;color:#3D332D">
    <span>† footnote</span><span>‡ source</span><span>§ section</span><span>¶ note</span><span>※ aside</span><span style="color:#B11226">№ series</span>
  </div>
</div></body></html>
