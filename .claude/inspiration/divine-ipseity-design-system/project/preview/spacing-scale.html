<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head>
<body style="min-height:200px;padding:28px 32px"><div class="card">
  <div class="label-eyebrow" style="margin-bottom:18px">Spacing scale — 4 px base</div>
  <div style="display:flex;gap:18px;align-items:flex-end">
    <div style="display:flex;flex-direction:column;align-items:center;gap:6px"><div style="background:#B11226;width:4px;height:4px"></div><div style="font-family:var(--font-mono);font-size:10px;color:#3D332D">1<br>4</div></div>
    <div style="display:flex;flex-direction:column;align-items:center;gap:6px"><div style="background:#B11226;width:8px;height:8px"></div><div style="font-family:var(--font-mono);font-size:10px;color:#3D332D">2<br>8</div></div>
    <div style="display:flex;flex-direction:column;align-items:center;gap:6px"><div style="background:#B11226;width:12px;height:12px"></div><div style="font-family:var(--font-mono);font-size:10px;color:#3D332D">3<br>12</div></div>
    <div style="display:flex;flex-direction:column;align-items:center;gap:6px"><div style="background:#B11226;width:16px;height:16px"></div><div style="font-family:var(--font-mono);font-size:10px;color:#3D332D">4<br>16</div></div>
    <div style="display:flex;flex-direction:column;align-items:center;gap:6px"><div style="background:#B11226;width:24px;height:24px"></div><div style="font-family:var(--font-mono);font-size:10px;color:#3D332D">5<br>24</div></div>
    <div style="display:flex;flex-direction:column;align-items:center;gap:6px"><div style="background:#B11226;width:32px;height:32px"></div><div style="font-family:var(--font-mono);font-size:10px;color:#3D332D">6<br>32</div></div>
    <div style="display:flex;flex-direction:column;align-items:center;gap:6px"><div style="background:#B11226;width:48px;height:48px"></div><div style="font-family:var(--font-mono);font-size:10px;color:#3D332D">7<br>48</div></div>
    <div style="display:flex;flex-direction:column;align-items:center;gap:6px"><div style="background:#B11226;width:64px;height:64px"></div><div style="font-family:var(--font-mono);font-size:10px;color:#3D332D">8<br>64</div></div>
    <div style="display:flex;flex-direction:column;align-items:center;gap:6px"><div style="background:#B11226;width:96px;height:96px"></div><div style="font-family:var(--font-mono);font-size:10px;color:#3D332D">9<br>96</div></div>
  </div>
</div></body></html>
