<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head>

    </div>
    <div style="border:1px solid rgba(24,20,18,.4);padding:18px 14px;height:130px;display:flex;flex-direction:column;justify-content:center;align-items:center;text-align:center">
      <div style="font-family:'Pirata One',serif;font-size:28px;color:#181412;line-height:1;letter-spacing:.01em">Systematic<br>Sins</div>
