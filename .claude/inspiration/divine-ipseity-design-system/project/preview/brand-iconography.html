<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head>
<body style="min-height:200px;padding:28px 32px"><div class="card">
  <div class="label-eyebrow" style="margin-bottom:14px">Iconography — typographic > pictographic</div>
  <div style="display:flex;gap:32px;align-items:center">
    <div style="display:flex;flex-direction:column;align-items:center;gap:6px"><div style="font-family:var(--font-serif);font-size:48px;color:#181412;line-height:1">¶</div><div style="font-family:var(--font-mono);font-size:10px;color:#6B5E54">paragraph</div></div>
    <div style="display:flex;flex-direction:column;align-items:center;gap:6px"><div style="font-family:var(--font-serif);font-size:48px;color:#181412;line-height:1">§</div><div style="font-family:var(--font-mono);font-size:10px;color:#6B5E54">section</div></div>
    <div style="display:flex;flex-direction:column;align-items:center;gap:6px"><div style="font-family:var(--font-serif);font-size:48px;color:#181412;line-height:1">†</div><div style="font-family:var(--font-mono);font-size:10px;color:#6B5E54">footnote</div></div>
    <div style="display:flex;flex-direction:column;align-items:center;gap:6px"><div style="font-family:var(--font-serif);font-size:48px;color:#181412;line-height:1">‡</div><div style="font-family:var(--font-mono);font-size:10px;color:#6B5E54">source</div></div>
    <div style="display:flex;flex-direction:column;align-items:center;gap:6px"><div style="font-family:var(--font-serif);font-style:italic;font-size:48px;color:#B11226;line-height:1">№</div><div style="font-family:var(--font-mono);font-size:10px;color:#6B5E54">series</div></div>
    <div style="display:flex;flex-direction:column;align-items:center;gap:6px"><div style="font-family:var(--font-serif);font-size:48px;color:#181412;line-height:1">※</div><div style="font-family:var(--font-mono);font-size:10px;color:#6B5E54">aside</div></div>
    <div style="display:flex;flex-direction:column;align-items:center;gap:6px"><div style="font-family:var(--font-serif);font-size:48px;color:#B11226;line-height:1">❦</div><div style="font-family:var(--font-mono);font-size:10px;color:#6B5E54">break</div></div>
    <div style="display:flex;flex-direction:column;align-items:center;gap:6px"><div style="font-family:var(--font-serif);font-size:48px;color:#181412;line-height:1">☞</div><div style="font-family:var(--font-mono);font-size:10px;color:#6B5E54">attention</div></div>
  </div>
  <div style="font-family:var(--font-mono);font-size:11px;color:#6B5E54;margin-top:12px;letter-spacing:.06em">Functional UI icons (close, search, cart) substituted from Lucide CDN — flagged for replacement.</div>
</div></body></html>
