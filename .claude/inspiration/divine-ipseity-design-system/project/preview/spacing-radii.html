<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head>
<body style="min-height:230px;padding:28px 32px"><div class="card">
  <div class="label-eyebrow" style="margin-bottom:18px">Radii — intentionally tiny</div>
  <div style="display:flex;gap:24px;align-items:flex-end">
    <div style="text-align:center"><div style="width:80px;height:80px;background:#181412;border-radius:0"></div><div style="font-family:var(--font-mono);font-size:11px;color:#3D332D;margin-top:8px">--r-0<br>0 px</div><div style="font-family:var(--font-sans);font-size:10px;color:#6B5E54;margin-top:2px">cards, fields, buttons</div></div>
    <div style="text-align:center"><div style="width:80px;height:80px;background:#181412;border-radius:2px"></div><div style="font-family:var(--font-mono);font-size:11px;color:#3D332D;margin-top:8px">--r-1<br>2 px</div><div style="font-family:var(--font-sans);font-size:10px;color:#6B5E54;margin-top:2px">small UI chrome</div></div>
    <div style="text-align:center"><div style="width:80px;height:80px;background:#181412;border-radius:4px"></div><div style="font-family:var(--font-mono);font-size:11px;color:#3D332D;margin-top:8px">--r-2 (max)<br>4 px</div><div style="font-family:var(--font-sans);font-size:10px;color:#6B5E54;margin-top:2px">badges, pills only</div></div>
    <div style="text-align:center;margin-left:24px;border-left:1px solid rgba(24,20,18,.25);padding-left:24px;height:120px;display:flex;flex-direction:column;justify-content:center">
      <div style="font-family:var(--font-serif);font-style:italic;font-size:18px;color:#7A0E1F;max-width:180px;line-height:1.35">Tall radii are SaaS body‑language. They read wrong on this brand.</div>
    </div>
  </div>
</div></body></html>
